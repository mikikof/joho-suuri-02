<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報数理入門 — 講義スライド一覧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFBFC;
    --surface: #FFFFFF;
    --surface-2: #F6F7F9;
    --surface-3: #EFF1F4;
    --ink: #1F2937;
    --ink-2: #4B5563;
    --ink-3: #9CA3AF;
    --line: #E5E7EB;
    --blue: #2563EB;
    --blue-dark: #1D4ED8;
    --blue-deep: #1E3A8A;
    --blue-bg: #EFF6FF;
    --blue-bg-2: #DBEAFE;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
    --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.06);
    --shadow-lg: 0 4px 6px rgba(15, 23, 42, 0.05), 0 20px 40px rgba(15, 23, 42, 0.08);
    --font-jp: "Zen Kaku Gothic New", sans-serif;
    --font-serif: "DM Serif Display", "Zen Kaku Gothic New", serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-jp);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    font-feature-settings: "palt";
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 80px 32px 120px;
  }

  .brand {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 56px;
  }
  .brand .mark {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%);
    border-radius: 10px;
    display: grid; place-items: center;
    color: white; font-family: var(--font-serif); font-size: 24px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
  }
  .brand .label {
    font-size: 12px; letter-spacing: 0.12em; color: var(--ink-3);
    text-transform: uppercase; font-weight: 500;
  }
  .brand .label strong { color: var(--ink-2); font-weight: 700; }

  h1 {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    line-height: 1.25;
  }
  .lede {
    font-size: 18px;
    color: var(--ink-2);
    margin-bottom: 56px;
    max-width: 680px;
  }

  .section-label {
    font-size: 11px; letter-spacing: 0.12em; color: var(--ink-3);
    text-transform: uppercase; font-weight: 600;
    margin-bottom: 16px;
  }

  .lec-list {
    display: grid;
    gap: 16px;
  }
  .lec-card {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    gap: 24px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow-sm);
    transition: all 0.15s ease;
  }
  .lec-card:hover {
    border-color: var(--blue-bg-2);
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .lec-card .num {
    font-family: var(--font-serif);
    font-size: 56px;
    color: var(--blue);
    line-height: 1;
    text-align: center;
  }
  .lec-card .body .ttl {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .lec-card .body .desc {
    font-size: 14px;
    color: var(--ink-2);
  }
  .lec-card .arrow {
    color: var(--ink-3);
    font-size: 20px;
    transition: transform 0.15s ease, color 0.15s ease;
  }
  .lec-card:hover .arrow {
    color: var(--blue);
    transform: translateX(4px);
  }

  .placeholder {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    gap: 24px;
    background: var(--surface-2);
    border: 1px dashed var(--line);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    color: var(--ink-3);
  }
  .placeholder .num {
    font-family: var(--font-serif);
    font-size: 56px;
    line-height: 1;
    text-align: center;
    color: var(--ink-3);
  }
  .placeholder .body .ttl { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .placeholder .body .desc { font-size: 14px; }
  .placeholder .tag {
    font-size: 11px; letter-spacing: 0.08em;
    background: var(--surface-3); color: var(--ink-2);
    padding: 4px 10px; border-radius: 999px;
    text-transform: uppercase; font-weight: 600;
  }

  footer {
    margin-top: 80px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink-3);
  }
  footer a { color: var(--blue-dark); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <div class="mark">情</div>
      <div>
        <div class="label">平成国際大学 情報デザイン学部</div>
        <div class="label"><strong>情報数理入門</strong> — 講義スライド</div>
      </div>
    </div>

    <h1>式とグラフで世界を動かす。</h1>
    <p class="lede">スライダーを動かしながら、複利・方程式・指数関数といった数理の基礎を体感する講義スライド集です。各回のリンクから本編を開けます。</p>

    <div class="section-label">講義回</div>
    <div class="lec-list">
      <a class="lec-card" href="lec02/index.html">
        <div class="num">02</div>
        <div class="body">
          <div class="ttl">第2回 — 式で世界を動かす</div>
          <div class="desc">複利・浮動小数点・1次方程式・1次不等式・連立方程式・指数爆発</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a class="lec-card" href="lec03/index.html">
        <div class="num">03</div>
        <div class="body">
          <div class="ttl">第3回 — 図形と方程式</div>
          <div class="desc">座標・距離（三平方の定理）・円の方程式・領域（内・外の判定）・距離は「似ている度」</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <div class="placeholder">
        <div class="num">04</div>
        <div class="body">
          <div class="ttl">第4回</div>
          <div class="desc">準備中</div>
        </div>
        <div class="tag">Coming soon</div>
      </div>
    </div>

    <footer>
      Source: <a href="https://github.com/mikikof/joho-suuri">github.com/mikikof/joho-suuri</a>
    </footer>
  </div>
</body>
</html>
